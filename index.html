<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบ AODB PM</title>
    <style>
        body {
            font-family: 'Sarabun', -apple-system, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .search-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        h2 {
            color: #333;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: center;
        }
        label {
            display: block;
            color: #666;
            margin-bottom: 12px;
            font-size: 16px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
            background-color: #fafafa;
        }
        input[type="text"]::placeholder {
            color: #ccc;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #198754;
            background-color: #fff;
        }
        button {
            width: 100%;
            background-color: #198754; /* สีเขียวเหมือนในตัวอย่าง */
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #157347;
        }
        #result {
            margin-top: 20px;
            text-align: left;
            font-size: 14px;
            color: #333;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="search-container">
    <h2>ระบบค้นหาหมายเลขซีเรียลอุปกรณ์</h2>
    
    <div class="form-group">
        <label for="searchQuery">ข้อมูลที่ต้องการค้นหา</label>
        <input type="text" id="searchQuery" placeholder="พิมพ์ที่นี่">
    </div>
    
    <button onclick="searchData()">ค้นหา</button>

    <div id="result"></div>
</div>

<script>
function searchData() {
    const query = document.getElementById('searchQuery').value;
    const resultDiv = document.getElementById('result');
    
    if(!query) {
        alert('กรุณากรอกข้อมูลที่ต้องการค้นหาครับ');
        return;
    }
    
    resultDiv.innerHTML = '<p style="text-align:center; color:#666;">กำลังค้นหาข้อมูล...</p>';
    
    // ลิงก์ Web App ของคุณ
    const url = 'https://script.google.com/macros/s/AKfycby7KYpkcZpnExecIIjAbDADsjk3ZSFt5yYhu-aXaIuvTJibLZ2sfcr7WgZSAv_obr9L/exec';
    
    fetch(`${url}?search=${encodeURIComponent(query)}`)
    .then(response => response.json())
    .then(data => {
        // แสดงผลลัพธ์ที่ได้กลับมาจาก Google Sheets
        resultDiv.innerHTML = `<div style="background:#f8f9fa; padding:10px; border-radius:6px; border:1px solid #eee;"><pre style="margin:0; white-space:pre-wrap;">${JSON.stringify(data, null, 2)}</pre></div>`;
    })
    .catch(error => {
        console.error('Error:', error);
        resultDiv.innerHTML = '<p style="text-align:center; color:red;">เกิดข้อผิดพลาดในการเชื่อมต่อระบบ</p>';
    });
}
</script>

</body>
</html>
